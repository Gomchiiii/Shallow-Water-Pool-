<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>얕은 물 시뮬레이터</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0d1f2d;
    overflow: hidden;
    cursor: none;
    font-family: 'Georgia', serif;
    width: 100vw; height: 100vh;
  }
  #ui-top {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 10;
  }
  #title {
    color: rgba(180,225,255,0.35);
    font-size: 0.68rem;
    letter-spacing: 5px;
    text-transform: uppercase;
  }
  #rain-btn {
    background: none;
    border: 1px solid rgba(120,190,255,0.3);
    color: rgba(160,215,255,0.55);
    font-size: 0.63rem;
    letter-spacing: 2px;
    padding: 4px 14px;
    cursor: pointer;
    border-radius: 20px;
    transition: all 0.25s;
    font-family: 'Georgia', serif;
  }
  #rain-btn:hover { border-color: rgba(120,190,255,0.65); color: rgba(180,230,255,0.9); }
  #rain-btn.on { background: rgba(80,160,255,0.12); border-color: rgba(120,190,255,0.65); color: rgba(200,235,255,0.9); }
  #hint {
    position: fixed;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    color: rgba(140,195,230,0.18);
    font-size: 0.63rem;
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
  }
  canvas { position: fixed; top:0; left:0; display:block; }
  #cursor-dot {
    position: fixed;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.75);
    box-shadow: 0 0 9px 3px rgba(120,200,255,0.4);
    pointer-events: none;
    transform: translate(-50%,-50%);
    z-index: 999;
  }
</style>
</head>
<body>

<div id="ui-top">
  <div id="title">shallow water</div>
  <button id="rain-btn" class="on">🌧 빗방울 ON</button>
</div>
<canvas id="c"></canvas>
<div id="hint">클릭 → 물방울 &nbsp;·&nbsp; 길게 누르고 드래그 → 물 밀기</div>
<div id="cursor-dot"></div>

<script>
// ================================================================
//  SHALLOW WATER SIMULATOR  v2
//  Isometric diagonal view, elliptical ripple rings,
//  Sandy beach bottom with wind ripples + caustics, rain toggle
// ================================================================

const CW = window.innerWidth, CH = window.innerHeight;
const canvas = document.getElementById('c');
canvas.width = CW; canvas.height = CH;
const ctx = canvas.getContext('2d');

// Simulation grid — 작게 해서 성능 확보
const COLS = 70, ROWS = 70;

// Isometric projection params
const TILE_CX =  CW / (COLS + ROWS) * 1.0;
const TILE_CY =  TILE_CX * 0.5;
const TILE_RX = -TILE_CX;
const TILE_RY =  TILE_CY;
const ORIGIN_X = CW * 0.5;
const ORIGIN_Y = CH * 0.06;
const H_SCALE  = 22;

function proj(c, r, h) {
  return {
    x: ORIGIN_X + c*TILE_CX + r*TILE_RX,
    y: ORIGIN_Y + c*TILE_CY + r*TILE_RY - h*H_SCALE
  };
}

// Unproject screen → grid (ignoring height)
function unproj(sx, sy) {
  // Solve: sx = OX + c*CX + r*RX,  sy = OY + c*CY + r*RY
  const dx = sx - ORIGIN_X, dy = sy - ORIGIN_Y;
  // Matrix inversion of [[CX,RX],[CY,RY]]
  const det = TILE_CX*TILE_RY - TILE_CY*TILE_RX;
  const c = (dx*TILE_RY - dy*TILE_RX) / det;
  const r = (TILE_CX*dy - TILE_CY*dx) / det;
  return { c: Math.round(c), r: Math.round(r) };
}

// ================================================================
//  🎨 COLOR PALETTE  ← 여기서 전체 색 조정
// ================================================================
const PALETTE = {
  // 배경 / 천장
  ceiling:      [253, 232, 130],   // 초록민트 

  // 측벽 (LEFT / RIGHT 대각 벽)
  wall:         [235, 227, 211],   // 기본 크림 화이트
  wallCorner:   0.58,              // 모서리 어두운 정도  (0=검정 ~ 1)
  wallEdge:     0.92,              // 모서리 반대편 밝기  (0 ~ 1)
  wallGrid:     [80, 75, 65],      // 격자 선 색

  // 수면 그라데이션 (뒤=밝음, 앞=어둠)
  waterFar:     [130, 220, 210],   // 먼 쪽 밝은 민트
  waterNear:    [ 28, 135, 150],   // 가까운 쪽 짙은 청록
  waterDepth:   0.55,              // 물 불투명도
  specular:     120,               // 반사광 강도

  // 앞벽 (수면 아래 보이는 풀 벽)
  // waterFar / waterNear 와 동일하게 연동되므로 별도 설정 불필요

  // 모래 바닥
  sandLight:    [195, 168, 108],   // 밝은 모래 (물결 봉우리)
  sandDark:     [155, 128,  80],   // 어두운 모래 (물결 골)
  caustic:      60,                // 코스틱 반사광 강도
};

// ================================================================
//  Wave height field
// ================================================================
let cur = new Float32Array(COLS * ROWS);
let vel = new Float32Array(COLS * ROWS);

const WAVE_C  = 0.20;
const DAMPING = 0.972;  // 강하게 감쇠 → 파문 빨리 사라짐

function stepWave() {
  const c2 = WAVE_C * WAVE_C;
  for (let r = 1; r < ROWS-1; r++) {
    for (let c = 1; c < COLS-1; c++) {
      const i = r*COLS+c;
      const lap = cur[i-1]+cur[i+1]+cur[i-COLS]+cur[i+COLS]-4*cur[i];
      vel[i] = (vel[i] + c2*lap) * DAMPING;
      vel[i] -= cur[i]*0.00012;
    }
  }
  for (let i = 0; i < COLS*ROWS; i++) cur[i] += vel[i];
  // Absorbing edges
  for (let x=0;x<COLS;x++){cur[x]*=0.2;cur[(ROWS-1)*COLS+x]*=0.2;}
  for (let y=0;y<ROWS;y++){cur[y*COLS]*=0.2;cur[y*COLS+COLS-1]*=0.2;}
}

function addDrop(gc, gr, strength, radius) {
  for (let dr=-radius;dr<=radius;dr++){
    for (let dc=-radius;dc<=radius;dc++){
      const rr=gr+dr, cc=gc+dc;
      if(rr<1||rr>=ROWS-1||cc<1||cc>=COLS-1)continue;
      const d=Math.sqrt(dr*dr+dc*dc);
      if(d>radius)continue;
      cur[rr*COLS+cc] -= strength * Math.cos(d/radius*Math.PI*0.5);
    }
  }
}

// ================================================================
//  Sand texture (static)
// ================================================================
const sandH   = new Float32Array(COLS * ROWS); // height variation
const sandRip = new Float32Array(COLS * ROWS); // ripple pattern

function vnoise(x, y, freq) {
  const xi=Math.floor(x*freq), yi=Math.floor(y*freq);
  const xf=x*freq-xi, yf=y*freq-yi;
  const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf);
  const h00=Math.abs(Math.sin(xi*127.1+yi*311.7)*43758.5)%1;
  const h10=Math.abs(Math.sin((xi+1)*127.1+yi*311.7)*43758.5)%1;
  const h01=Math.abs(Math.sin(xi*127.1+(yi+1)*311.7)*43758.5)%1;
  const h11=Math.abs(Math.sin((xi+1)*127.1+(yi+1)*311.7)*43758.5)%1;
  return h00*(1-u)*(1-v)+h10*u*(1-v)+h01*(1-u)*v+h11*u*v;
}

for (let r=0;r<ROWS;r++){
  for (let c=0;c<COLS;c++){
    const i=r*COLS+c;
    sandH[i] = vnoise(c,r,0.035)*0.5 + vnoise(c,r,0.09)*0.3 + vnoise(c,r,0.22)*0.15 + vnoise(c,r,0.55)*0.05;
    // Diagonal wind ripples
    const rph = (c*0.72 + r*0.28)*0.5;
    sandRip[i] = (Math.sin(rph)*0.5+0.5)*0.5 + vnoise(c,r,0.18)*0.5;
  }
}

// ================================================================
//  Colour helpers
// ================================================================
function lerp(a,b,t){return a+(b-a)*t;}

function getSandColor(i, causticV) {
  const sh = sandH[i], sr = sandRip[i];
  const [sLR,sLG,sLB] = PALETTE.sandLight;
  const [sDR,sDG,sDB] = PALETTE.sandDark;
  const R = lerp(sLR, sDR, 1-sr) + causticV * PALETTE.caustic / 60 * 60;
  const G = lerp(sLG, sDG, 1-sr) + causticV * PALETTE.caustic / 60 * 48;
  const B = lerp(sLB, sDB, 1-sr) + causticV * PALETTE.caustic / 60 * 20;
  return [Math.min(255,R)|0, Math.min(255,G)|0, Math.min(255,B)|0];
}

function getWaterColor(sandR, sandG, sandB, wh, spec, rowT) {
  const [fR,fG,fB] = PALETTE.waterFar;
  const [nR,nG,nB] = PALETTE.waterNear;
  const WR = lerp(fR, nR, rowT);
  const WG = lerp(fG, nG, rowT);
  const WB = lerp(fB, nB, rowT);
  const w = Math.min(1, PALETTE.waterDepth + wh*0.25);
  const specV = spec * PALETTE.specular;
  return [
    Math.min(255, lerp(sandR,WR,w) + specV)|0,
    Math.min(255, lerp(sandG,WG,w) + specV)|0,
    Math.min(255, lerp(sandB,WB,w) + specV)|0,
  ];
}

// ================================================================
//  Ripple rings (elliptical to match iso perspective)
// ================================================================
let rings = [];

// Screen position of grid cell (center)
function cellScreenPos(gc, gr) {
  return proj(gc + 0.5, gr + 0.5, 0);
}

const MAX_RINGS = 12;

function addRing(sx, sy, strength) {
  if (rings.length >= MAX_RINGS) rings.shift();
  rings.push({ x:sx, y:sy, r:2, maxR:40+Math.abs(strength)*10, alpha:0.65, speed:2.2+Math.abs(strength)*0.3 });
}

const ISO_RATIO = TILE_CY / TILE_CX; // ≈ 0.5 — vertical squeeze for ellipse

function updateRings() {
  ctx.save();
  for (const rg of rings) {
    rg.r   += rg.speed;
    rg.alpha *= 0.82;  // 더 빠르게 페이드
    if (rg.alpha < 0.015 || rg.r >= rg.maxR) continue;

    const rx = rg.r;
    const ry = rg.r * ISO_RATIO;

    ctx.beginPath();
    ctx.ellipse(rg.x, rg.y, rx, ry, 0, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(210,242,255,${rg.alpha*0.55})`;
    ctx.lineWidth = 1.3;
    ctx.stroke();

    if (rg.r > 12) {
      ctx.beginPath();
      ctx.ellipse(rg.x, rg.y, rx*0.56, ry*0.56, 0, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,${rg.alpha*0.22})`;
      ctx.lineWidth = 0.7;
      ctx.stroke();
    }
  }
  ctx.restore();
  rings = rings.filter(rg => rg.alpha > 0.015 && rg.r < rg.maxR);
}

// ================================================================
//  Offscreen wall canvas — 한 번만 굽고 매 프레임 drawImage
// ================================================================
const WALL_ROWS = 28;
const WALL_BASE = [220, 215, 205];

const wallCanvas = document.createElement('canvas');
wallCanvas.width = CW; wallCanvas.height = CH;
const wctx = wallCanvas.getContext('2d');

function bakeWalls() {
  const CELL_H = TILE_CY * 2.2;
  const [cR,cG,cB] = PALETTE.ceiling;
  const [wR,wG,wB] = PALETTE.wall;
  const [gR,gG,gB] = PALETTE.wallGrid;

  wctx.fillStyle = `rgb(${cR},${cG},${cB})`;
  wctx.fillRect(0, 0, CW, CH);

  function bakeCell(p0, p1, p2, p3, brightness) {
    wctx.beginPath();
    wctx.moveTo(p0.x,p0.y); wctx.lineTo(p1.x,p1.y);
    wctx.lineTo(p2.x,p2.y); wctx.lineTo(p3.x,p3.y);
    wctx.closePath();
    wctx.fillStyle = `rgb(${(wR*brightness)|0},${(wG*brightness)|0},${(wB*brightness)|0})`;
    wctx.fill();
    wctx.strokeStyle = `rgba(${gR},${gG},${gB},${0.15*brightness})`;
    wctx.lineWidth = 0.5;
    wctx.stroke();
  }

  // LEFT 벽
  for (let row = 0; row < ROWS-1; row++) {
    const wA = proj(0, row,   0);
    const wB2 = proj(0, row+1, 0);
    const tMid = (row + 0.5) / (ROWS-1);
    for (let wr = 0; wr < WALL_ROWS; wr++) {
      const heightT = wr / (WALL_ROWS-1);
      const b = lerp(PALETTE.wallCorner, PALETTE.wallEdge, tMid) * lerp(0.82, 1.0, heightT);
      bakeCell(
        {x:wA.x,  y:wA.y -(wr+1)*CELL_H}, {x:wB2.x, y:wB2.y-(wr+1)*CELL_H},
        {x:wB2.x, y:wB2.y-wr*CELL_H},     {x:wA.x,  y:wA.y -wr*CELL_H}, b);
    }
  }

  // RIGHT 벽
  for (let col = 0; col < COLS-1; col++) {
    const wA = proj(col,   0, 0);
    const wB2 = proj(col+1, 0, 0);
    const tMid = (col + 0.5) / (COLS-1);
    for (let wr = 0; wr < WALL_ROWS; wr++) {
      const heightT = wr / (WALL_ROWS-1);
      const b = lerp(PALETTE.wallCorner, PALETTE.wallEdge, tMid) * lerp(0.82, 1.0, heightT);
      bakeCell(
        {x:wA.x,  y:wA.y -(wr+1)*CELL_H}, {x:wB2.x, y:wB2.y-(wr+1)*CELL_H},
        {x:wB2.x, y:wB2.y-wr*CELL_H},     {x:wA.x,  y:wA.y -wr*CELL_H}, b);
    }
  }
  // ※ 앞쪽 벽면은 render()에서 매 프레임 수면색으로 동적으로 그림
}
bakeWalls(); // 시작 시 한 번만

// 수면 색 LUT — rowT별 미리 계산 (PALETTE 기반)
const waterLUT = new Array(ROWS);
for (let r = 0; r < ROWS; r++) {
  const rowT = r / (ROWS-2);
  const [fR,fG,fB] = PALETTE.waterFar;
  const [nR,nG,nB] = PALETTE.waterNear;
  waterLUT[r] = [
    lerp(fR, nR, rowT)|0,
    lerp(fG, nG, rowT)|0,
    lerp(fB, nB, rowT)|0,
  ];
}

const FRONT_WALL_ROWS = 6;
const CELL_H_FRONT = TILE_CY * 2.2;

function render() {
  // 1) 측벽 한 방에 복사 (offscreen bake)
  ctx.drawImage(wallCanvas, 0, 0);

  // 2) 수면 타일 + 앞벽 동적 렌더
  const DEPTH = PALETTE.waterDepth;
  const SPEC  = PALETTE.specular;
  const [sLR,sLG,sLB] = PALETTE.sandLight;
  const [sDR,sDG,sDB] = PALETTE.sandDark;
  const CAUS  = PALETTE.caustic;

  for (let r = 0; r < ROWS-1; r++) {
    const [WR,WG,WB] = waterLUT[r];
    for (let c = 0; c < COLS-1; c++) {
      const i  = r*COLS+c;
      const h0=cur[i], h1=cur[i+1], h2=cur[i+COLS], h3=cur[i+COLS+1];
      const hAvg = (h0+h1+h2+h3)*0.25;
      const dhdx=h1-h0, dhdr=h2-h0;
      // spec: 0~1 범위로 클램프
      const spec     = Math.min(1, Math.max(0, -dhdx*0.5-dhdr*0.5));
      const specT    = Math.pow(spec, 3) * (SPEC / 120); // 0~1
      const causticV = Math.max(0, -(dhdx+dhdr)*4);

      const sr = sandRip[i];
      const sR = lerp(sLR,sDR,1-sr) + causticV*CAUS/60*60;
      const sG = lerp(sLG,sDG,1-sr) + causticV*CAUS/60*48;
      const sB = lerp(sLB,sDB,1-sr) + causticV*CAUS/60*20;

      const w = Math.min(1, DEPTH + hAvg*0.25);
      // 수면색 계산 후 specular는 흰색(255,255,255) 방향으로 lerp
      const baseR = sR*(1-w) + WR*w;
      const baseG = sG*(1-w) + WG*w;
      const baseB = sB*(1-w) + WB*w;
      const fR2 = Math.min(255, lerp(baseR, 255, specT))|0;
      const fG2 = Math.min(255, lerp(baseG, 255, specT))|0;
      const fB2 = Math.min(255, lerp(baseB, 255, specT))|0;

      const p0=proj(c,   r,   h0);
      const p1=proj(c+1, r,   h1);
      const p2=proj(c+1, r+1, h3);
      const p3=proj(c,   r+1, h2);

      ctx.beginPath();
      ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y);
      ctx.lineTo(p2.x,p2.y); ctx.lineTo(p3.x,p3.y);
      ctx.closePath();
      ctx.fillStyle = `rgb(${fR2},${fG2},${fB2})`;
      ctx.fill();

      // ---- 앞쪽 벽면: 해당 셀의 실제 수면색 그대로 사용 ----
      if (r === ROWS-2) {
        // LEFT 앞벽: c방향, 코너쪽 살짝 어둡게
        const colMix = lerp(0.75, 1.0, (c+0.5)/(COLS-2));
        const wR2=(fR2*colMix)|0, wG2=(fG2*colMix)|0, wB2=(fB2*colMix)|0;
        for (let fw = 0; fw < FRONT_WALL_ROWS; fw++) {
          const fade = lerp(1.0, 0.65, fw/(FRONT_WALL_ROWS-1));
          ctx.beginPath();
          ctx.moveTo(p3.x, p3.y+fw*CELL_H_FRONT);
          ctx.lineTo(p2.x, p2.y+fw*CELL_H_FRONT);
          ctx.lineTo(p2.x, p2.y+(fw+1)*CELL_H_FRONT);
          ctx.lineTo(p3.x, p3.y+(fw+1)*CELL_H_FRONT);
          ctx.closePath();
          ctx.fillStyle = `rgb(${(wR2*fade)|0},${(wG2*fade)|0},${(wB2*fade)|0})`;
          ctx.fill();
        }
      }

      if (c === COLS-2) {
        // RIGHT 앞벽: r방향, 코너쪽 살짝 어둡게
        const rowMix = lerp(0.75, 1.0, (r+0.5)/(ROWS-2));
        const wR2=(fR2*rowMix)|0, wG2=(fG2*rowMix)|0, wB2=(fB2*rowMix)|0;
        for (let fw = 0; fw < FRONT_WALL_ROWS; fw++) {
          const fade = lerp(1.0, 0.65, fw/(FRONT_WALL_ROWS-1));
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y+fw*CELL_H_FRONT);
          ctx.lineTo(p2.x, p2.y+fw*CELL_H_FRONT);
          ctx.lineTo(p2.x, p2.y+(fw+1)*CELL_H_FRONT);
          ctx.lineTo(p1.x, p1.y+(fw+1)*CELL_H_FRONT);
          ctx.closePath();
          ctx.fillStyle = `rgb(${(wR2*fade)|0},${(wG2*fade)|0},${(wB2*fade)|0})`;
          ctx.fill();
        }
      }
    }
  }
}

// ================================================================
//  Interaction
// ================================================================
const cursorDot = document.getElementById('cursor-dot');
let mx=CW/2, my=CH/2, mousePressed=false, isHold=false, holdTimer=null, wakeTimer=0;

document.addEventListener('mousemove', e => {
  cursorDot.style.left = e.clientX+'px';
  cursorDot.style.top  = e.clientY+'px';
  const rc = canvas.getBoundingClientRect();
  mx = e.clientX-rc.left; my = e.clientY-rc.top;
  if (mousePressed && isHold) {
    wakeTimer++;
    if (wakeTimer%2===0) {
      const {c,r}=unproj(mx,my);
      if(c>=1&&c<COLS-1&&r>=1&&r<ROWS-1) addDrop(c,r,1.1,3);
    }
    if (wakeTimer%12===0) addRing(mx,my,1.1);
  }
});

canvas.addEventListener('mousedown', e => {
  mousePressed=true; isHold=false;
  holdTimer=setTimeout(()=>{isHold=true;},190);
  const rc=canvas.getBoundingClientRect();
  const lx=e.clientX-rc.left, ly=e.clientY-rc.top;
  const {c,r}=unproj(lx,ly);
  if(c>=1&&c<COLS-1&&r>=1&&r<ROWS-1){addDrop(c,r,3.8,5);addRing(lx,ly,3.8);}
});
canvas.addEventListener('mouseup',()=>{mousePressed=false;isHold=false;clearTimeout(holdTimer);wakeTimer=0;});
canvas.addEventListener('mouseleave',()=>{mousePressed=false;isHold=false;clearTimeout(holdTimer);wakeTimer=0;});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault(); mousePressed=true; isHold=false;
  holdTimer=setTimeout(()=>{isHold=true;},190);
  const rc=canvas.getBoundingClientRect(),t=e.touches[0];
  const lx=t.clientX-rc.left,ly=t.clientY-rc.top; mx=lx;my=ly;
  const {c,r}=unproj(lx,ly);
  if(c>=1&&c<COLS-1&&r>=1&&r<ROWS-1){addDrop(c,r,3.8,5);addRing(lx,ly,3.8);}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const rc=canvas.getBoundingClientRect(),t=e.touches[0];
  const lx=t.clientX-rc.left,ly=t.clientY-rc.top; mx=lx;my=ly;
  if(isHold){wakeTimer++;if(wakeTimer%2===0){const{c,r}=unproj(lx,ly);if(c>=1&&c<COLS-1&&r>=1&&r<ROWS-1)addDrop(c,r,1.1,3);}if(wakeTimer%12===0)addRing(lx,ly,1.1);}
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();mousePressed=false;isHold=false;clearTimeout(holdTimer);wakeTimer=0;},{passive:false});

// ================================================================
//  Rain toggle
// ================================================================
let rainOn = true;
let rainTimer = 0;
document.getElementById('rain-btn').addEventListener('click', function(){
  rainOn = !rainOn;
  this.textContent = rainOn ? '🌧 빗방울 ON' : '☀️ 빗방울 OFF';
  this.classList.toggle('on', rainOn);
});

function ambientRain() {
  if (!rainOn) return;
  rainTimer++;
  if (rainTimer % 80 === 0) {
    const gc = 3+Math.floor(Math.random()*(COLS-6));
    const gr = 3+Math.floor(Math.random()*(ROWS-6));
    const str = 0.5+Math.random()*0.85;
    addDrop(gc, gr, str, 2);
    const sp = proj(gc+0.5, gr+0.5, 0);
    addRing(sp.x, sp.y, str);
  }
}

// ================================================================
//  Cursor glow
// ================================================================
function drawCursorGlow() {
  if (!mousePressed) return;
  const g = ctx.createRadialGradient(mx,my,0,mx,my,26);
  g.addColorStop(0,  'rgba(200,235,255,0.14)');
  g.addColorStop(0.5,'rgba(100,190,255,0.05)');
  g.addColorStop(1,  'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(mx,my,26,0,Math.PI*2); ctx.fill();
}

// ================================================================
//  MAIN LOOP
// ================================================================
function loop() {
  stepWave();
  ambientRain();
  render();
  updateRings();
  drawCursorGlow();
  requestAnimationFrame(loop);
}
loop();
</script>
